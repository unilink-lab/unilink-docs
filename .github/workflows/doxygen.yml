name: Doxygen

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      wirestead_ref:
        description: "Wirestead ref to generate API docs from"
        default: "main"
        required: true

jobs:
  doxygen:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout docs
        uses: actions/checkout@v4

      - name: Checkout Wirestead core
        uses: actions/checkout@v4
        with:
          repository: wirestead/wirestead
          ref: ${{ inputs.wirestead_ref || 'main' }}
          path: external/wirestead

      - name: Install Doxygen
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz

      - name: Generate API reference
        run: |
          ./scripts/generate_docs.sh

      - name: Upload Doxygen artifact
        uses: actions/upload-artifact@v4
        with:
          name: doxygen-html
          path: build/doxygen/html
