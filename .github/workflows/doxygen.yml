name: Doxygen

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      unilink_ref:
        description: "unilink ref to generate API docs from"
        default: "main"
        required: true

jobs:
  doxygen:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout docs
        uses: actions/checkout@v4

      - name: Checkout unilink core
        uses: actions/checkout@v4
        with:
          repository: jwsung91/unilink
          ref: ${{ inputs.unilink_ref || 'main' }}
          path: external/unilink

      - name: Install Doxygen
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz

      - name: Generate API reference
        run: |
          ./scripts/generate_docs.sh

      - name: Upload Doxygen artifact
        uses: actions/upload-artifact@v4
        with:
          name: doxygen-html
          path: build/doxygen/html

      # Deploys straight to jwsung91/unilink's own gh-pages branch (not this
      # repo's) so the docs keep serving from the existing
      # https://jwsung91.github.io/unilink/ address. Only runs on a direct
      # push to main here - never for PRs, and not for an arbitrary
      # workflow_dispatch ref, to avoid publishing untrusted or non-main
      # content. keep_files is required: coverage.yml deploys test-coverage
      # reports under coverage/ on that same branch/root, and without
      # keep_files this deploy would delete that directory on every run.
      - name: Deploy API docs to jwsung91/unilink Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.UNILINK_PAGES_DEPLOY_KEY }}
          external_repository: jwsung91/unilink
          publish_branch: gh-pages
          publish_dir: build/doxygen/html
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'deploy: API docs from unilink-docs@${{ github.sha }}'
